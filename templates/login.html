<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — YouTube Clipper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0a0a0a; color: #e8e8e8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #111; border: 1px solid #1e1e1e; border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; }
    h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #ff4444, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 32px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 0.78rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    input { width: 100%; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 10px; color: #e8e8e8; font-size: 1rem; padding: 13px 14px; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #ff4444; }
    button { width: 100%; background: linear-gradient(135deg, #ff4444, #ff8c00); border: none; border-radius: 10px; color: #fff; font-size: 1rem; font-weight: 700; padding: 14px; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.4; }
    .error { background: #1a0505; border: 1px solid #5c1a1a; border-radius: 8px; color: #ff6b6b; font-size: 0.85rem; padding: 10px 14px; margin-top: 12px; display: none; }
    .footer { text-align: center; margin-top: 24px; font-size: 0.85rem; color: #666; }
    .footer a { color: #ff4444; text-decoration: none; }
  </style>
</head>
<body>
<div class="card">
  <h1>✂️ YouTube Clipper</h1>
  <p class="subtitle">Masuk ke akun kamu</p>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="kamu@email.com" />
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" />
  </div>

  <button id="btn" onclick="doLogin()">Masuk</button>
  <div class="error" id="error"></div>

  <div class="footer">
    <a href="/forgot-password">Lupa password?</a> &nbsp;·&nbsp; Belum punya akun? <a href="/register">Daftar gratis</a>
  </div>
</div>
<script>
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  async function doLogin() {
    const btn = document.getElementById('btn');
    btn.disabled = true; btn.textContent = 'Masuk...';
    const resp = await fetch('/login', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
    });
    const data = await resp.json();
    if (data.ok) { window.location = data.redirect; }
    else {
      const el = document.getElementById('error');
      el.textContent = data.error; el.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Masuk';
    }
  }
</script>
</body>
</html>
