<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lupa Password — YouTube Clipper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0a0a0a; color: #e8e8e8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #111; border: 1px solid #1e1e1e; border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; }
    h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #ff4444, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 32px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 0.78rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    input { width: 100%; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 10px; color: #e8e8e8; font-size: 1rem; padding: 13px 14px; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #ff4444; }
    button { width: 100%; background: linear-gradient(135deg, #ff4444, #ff8c00); border: none; border-radius: 10px; color: #fff; font-size: 1rem; font-weight: 700; padding: 14px; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.4; }
    .error { background: #1a0505; border: 1px solid #5c1a1a; border-radius: 8px; color: #ff6b6b; font-size: 0.85rem; padding: 10px 14px; margin-top: 12px; display: none; }
    .success { background: #0d1a0d; border: 1px solid #1a3a1a; border-radius: 8px; color: #4cde87; font-size: 0.85rem; padding: 10px 14px; margin-top: 12px; display: none; }
    .footer { text-align: center; margin-top: 24px; font-size: 0.85rem; color: #666; }
    .footer a { color: #ff4444; text-decoration: none; }
  </style>
</head>
<body>
<div class="card">
  <h1>✂️ YouTube Clipper</h1>
  <p class="subtitle">Reset password via WhatsApp</p>

  <div id="step1">
    <div class="field">
      <label>Nomor HP (WhatsApp)</label>
      <input type="tel" id="phone" placeholder="08xxxxxxxxxx" />
    </div>
    <button id="btn1" onclick="kirimOTP()">Kirim Kode OTP</button>
    <div class="error" id="error1"></div>
    <div class="success" id="success1"></div>
  </div>

  <div id="step2" style="display:none;">
    <div class="field">
      <label>Kode OTP (6 digit)</label>
      <input type="text" id="otp" placeholder="123456" maxlength="6" />
    </div>
    <div class="field">
      <label>Password Baru</label>
      <input type="password" id="newpw" placeholder="Minimal 6 karakter" />
    </div>
    <button id="btn2" onclick="resetPassword()">Reset Password</button>
    <div class="error" id="error2"></div>
  </div>

  <div class="footer">
    <a href="/login">← Kembali ke Login</a>
  </div>
</div>
<script>
  let phoneGlobal = '';

  async function kirimOTP() {
    const btn = document.getElementById('btn1');
    btn.disabled = true; btn.textContent = 'Mengirim...';
    const phone = document.getElementById('phone').value.trim();
    const resp = await fetch('/forgot-password', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({phone})
    });
    const data = await resp.json();
    if (data.ok) {
      phoneGlobal = phone;
      document.getElementById('success1').textContent = 'Kode OTP sudah dikirim ke WhatsApp kamu!';
      document.getElementById('success1').style.display = 'block';
      document.getElementById('error1').style.display = 'none';
      setTimeout(() => {
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
      }, 1500);
    } else {
      document.getElementById('error1').textContent = data.error;
      document.getElementById('error1').style.display = 'block';
      btn.disabled = false; btn.textContent = 'Kirim Kode OTP';
    }
  }

  async function resetPassword() {
    const btn = document.getElementById('btn2');
    btn.disabled = true; btn.textContent = 'Menyimpan...';
    const resp = await fetch('/reset-password', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({phone: phoneGlobal, otp: document.getElementById('otp').value, password: document.getElementById('newpw').value})
    });
    const data = await resp.json();
    if (data.ok) { window.location = '/login'; }
    else {
      document.getElementById('error2').textContent = data.error;
      document.getElementById('error2').style.display = 'block';
      btn.disabled = false; btn.textContent = 'Reset Password';
    }
  }
</script>
</body>
</html>
