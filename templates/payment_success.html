<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pembayaran Berhasil — YouTube Clipper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0a0a0a; color: #e8e8e8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #111; border: 1px solid #1a5c38; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 440px; text-align: center; }
    .icon { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 1.8rem; font-weight: 800; color: #4cde87; margin-bottom: 10px; }
    p { color: #888; font-size: 0.95rem; line-height: 1.6; margin-bottom: 8px; }
    .order { background: #0a0a0a; border: 1px solid #1e1e1e; border-radius: 8px; padding: 10px 16px; font-family: monospace; font-size: 0.82rem; color: #666; margin: 20px 0; }
    .btn { display: inline-block; background: linear-gradient(135deg, #ff4444, #ff8c00); color: #fff; text-decoration: none; font-weight: 700; padding: 13px 32px; border-radius: 10px; margin-top: 8px; }
    .btn-dash { display: inline-block; color: #888; text-decoration: none; font-size: 0.88rem; margin-top: 14px; }
    .btn-dash:hover { color: #ccc; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <h1>Pembayaran Berhasil!</h1>
  <p>Akun kamu sudah diupgrade. Selamat menikmati fitur premium!</p>
  {% if sub %}
  <div class="order">Order: {{ sub.order_id }}</div>
  {% endif %}
  <a href="/" class="btn">Mulai Nge-Clip →</a><br/>
  <a href="/dashboard" class="btn-dash">Lihat Dashboard</a>
</div>
</body>
</html>
